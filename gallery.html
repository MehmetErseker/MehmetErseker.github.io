<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Mitat Mehmet Erseker</title>
  <meta
    name="description"
    content="Project and experience screenshot gallery of Mitat Mehmet Erseker."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Mitat Mehmet Erseker</a>
    <div class="header-right">
      <nav class="site-nav" id="siteNav">
        <a href="index.html" data-i18n="nav_about">About</a>
        <a href="projects.html" data-i18n="nav_projects">Projects</a>
        <a href="experiences.html" data-i18n="nav_experiences">Experiences</a>
        <a href="contacts.html" data-i18n="nav_contact">Contact</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" aria-pressed="false">
        Dark mode
      </button>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">TR-EN</button>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false" data-i18n="menu_button">Menu</button>
    </div>
  </header>

  <main id="top">
    <section class="section">
      <div class="section-head">
        <p class="section-kicker" data-i18n="gallery_kicker">Screenshots</p>
        <h2 id="galleryTitle">Gallery</h2>
      </div>
      <p id="galleryMessage" class="gallery-message"></p>
      <div id="galleryGrid" class="gallery-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; <span id="year"></span> Mitat Mehmet Erseker</small>
    <small class="footer-updated"><span data-i18n="footer_last_updated">Last updated:</span> <time id="lastUpdated" datetime="2026-03-18">March 18, 2026</time></small>
  </footer>

  <div id="imageLightbox" class="image-lightbox" aria-hidden="true">
    <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close image">×</button>
    <img id="lightboxImage" class="lightbox-image" src="" alt="">
  </div>

  <script src="script.js"></script>
</body>
</html>
